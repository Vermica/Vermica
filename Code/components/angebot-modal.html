<!-- ANGEBOT MODAL -->
<div class="angebot-modal" id="angebotModal">

  <div class="angebot-box">

    <button class="modal-close" onclick="closeOfferModal()" aria-label="Formular schließen">
      <i class="fa-solid fa-xmark"></i>
    </button>

    <div class="angebot-header">
      <div>
       <span>AANFRAGEFORMULAR</span>
<h2>Ihr individuelles Angebot anfordern</h2>
<p>
  Teilen Sie uns kurz mit, welche Reinigung Sie benötigen.
  Wir melden uns schnellstmöglich bei Ihnen.
</p>
      </div>

      <img src="Foto/V-logo2.png" alt="VERMICA Gebäudeservice">
    </div>

    <form
      class="angebot-form"
      action="https://formsubmit.co/kontakt@vermica.de"
      method="POST"
    >

      <input type="hidden" name="_subject" value="Neue Angebotsanfrage über VERMICA Website">
<input type="hidden" name="_template" value="table">
<input type="text" name="_honey" style="display:none">

 <!-- Heq reCAPTCHA -->
  <input type="hidden" name="_captcha"  value="false">

  <!-- Pas dërgimit hap danke.html -->
  
<input type="hidden" name="_next" value="https://www.vermica.de/danke.html">


 
      <div class="form-section">
        <h3>Ihre Daten</h3>

        <div class="form-grid">

          <div class="form-group">
            <label>Ihr Name*</label>
            <input type="text" name="Name" placeholder="Vor- und Nachname" required>
          </div>

          <div class="form-group">
            <label>Ihre E-Mail-Adresse*</label>
            <input type="email" name="email" placeholder="E-Mail-Adresse" required>
          </div>

          <div class="form-group">
            <label>Ihre Telefonnummer*</label>
            <input type="tel" name="Telefon" placeholder="Telefonnummer" required>
          </div>

          <div class="form-group">
            <label>Ihre Adresse*</label>
            <input type="text" name="Adresse" placeholder="Straße und Hausnummer" required>
          </div>

          <div class="form-group">
            <label>PLZ*</label>
            <input type="text" name="PLZ" placeholder="PLZ" required>
          </div>

          <div class="form-group">
            <label>Ort*</label>
            <input type="text" name="Ort" placeholder="Ort" required>
          </div>

        </div>
      </div>

      <div class="form-section">
        <h3>Informationen zum Objekt</h3>

        <div class="form-grid">

          <div class="form-group">
            <label>Objekttyp*</label>
            <select name="Objekttyp" required>
              <option value="">Bitte auswählen</option>
              <option>Wohnung</option>
              <option>Haus</option>
              <option>Büro</option>
              <option>Praxis</option>
              <option>Treppenhaus</option>
              <option>Gewerbeobjekt</option>
              <option>Außenanlage / Garten</option>
            </select>
          </div>

          <div class="form-group">
            <label>Gesamtfläche (m²)*</label>
            <input type="number" name="Gesamtfläche m²" placeholder="z.B. 120" required>
          </div>

          <div class="form-group">
            <label>Anzahl der Zimmer</label>
            <input type="number" name="Anzahl der Zimmer" placeholder="z.B. 4">
          </div>

          <div class="form-group">
            <label>Anzahl der Badezimmer</label>
            <input type="number" name="Anzahl der Badezimmer" placeholder="z.B. 2">
          </div>

          <div class="form-group">
            <label>Etage</label>
            <input type="text" name="Etage" placeholder="z.B. 2. Stock">
          </div>

          <div class="form-group">
            <label>Aufzug vorhanden?</label>
            <select name="Aufzug vorhanden">
              <option value="">Bitte auswählen</option>
              <option>Ja</option>
              <option>Nein</option>
            </select>
          </div>
<div class="form-group">
  <label>Reinigung pro Monat</label>
  <input 
    type="text" 
    name="Reinigung pro Monat" 
    placeholder="z.B. 4x monatlich"
  >
</div>
        </div>
      </div>

      <div class="form-section">
        <h3>Gewünschte Leistungen</h3>

        <div class="checkbox-grid">

          <label class="checkbox-card">
            <input type="checkbox" name="Leistung[]" value="Büroreinigung">
            <span><i class="fa-solid fa-building"></i> Büroreinigung</span>
          </label>

          <label class="checkbox-card">
            <input type="checkbox" name="Leistung[]" value="Fensterreinigung">
            <span><i class="fa-solid fa-window-maximize"></i> Fensterreinigung</span>
          </label>

          <label class="checkbox-card">
            <input type="checkbox" name="Leistung[]" value="Treppenhausreinigung">
            <span><i class="fa-solid fa-broom"></i> Treppenhausreinigung</span>
          </label>

          <label class="checkbox-card">
            <input type="checkbox" name="Leistung[]" value="Unterhaltsreinigung">
            <span><i class="fa-solid fa-spray-can-sparkles"></i> Unterhaltsreinigung</span>
          </label>

          <label class="checkbox-card">
            <input type="checkbox" name="Leistung[]" value="Gartenpflege">
            <span><i class="fa-solid fa-leaf"></i> Gartenpflege</span>
          </label>

        </div>
      </div>

      <div class="form-section">
        <h3>Weitere Informationen</h3>

        <div class="form-grid">

          <div class="form-group full">
            <label>Ihre Nachricht</label>
            <textarea name="Nachricht" rows="6" placeholder="Beschreiben Sie Ihr Anliegen oder besondere Anforderungen..."></textarea>
          </div>

          <div class="form-group">
            <label>Gewünschter Reinigungstermin</label>
            <input type="date" name="Gewünschter Termin">
          </div>

          <div class="form-group">
            <label>Uhrzeit</label>
            <select name="Uhrzeit">
              <option value="">Bitte auswählen</option>
              <option>Vormittag</option>
              <option>Nachmittag</option>
              <option>Abend</option>
              <option>Nach Vereinbarung</option>
            </select>
          </div>

        </div>
      </div>

      <label class="privacy-check">
        <input type="checkbox" name="Datenschutz akzeptiert" required>
        <span>
          Ich habe die Datenschutzerklärung gelesen und stimme der Verarbeitung meiner Daten zu.*
        </span>
      </label>

      <button type="submit" class="submit-offer-btn">
        <i class="fa-solid fa-paper-plane"></i>
        Angebot anfordern
      </button>

      <p class="pflichtfeld">* Pflichtfeld</p>

    </form>

  </div>

</div>
